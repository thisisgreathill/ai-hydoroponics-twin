services:
  # 1. HABEŞLEŞME KATMANI (MQTT Broker)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"     # Cihazların bağlanacağı port
      - "9001:9001"     # Web üzerinden izleme portu
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot_network

  # 2. VERİTABANI (Zaman Serisi)
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_v2
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123  # Şifreyi değiştirebilirsiniz
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=hydro_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - iot_network

  # 3. GÖRSELLEŞTİRME (Dashboard)
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana_ui
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - iot_network

volumes:
  influxdb_data:
  grafana_storage:

networks:
  iot_network:
    driver: bridge